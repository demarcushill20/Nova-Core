name: Guardrails

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for runtime artifacts and secrets
        run: scripts/check-guardrails.sh --all

      - name: Run tests
        run: python3 -m pytest tests/ -q
